<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌕</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font: 13px system-ui; text-align: center;
    pointer-events: none; z-index: 10; transition: opacity 1s;
  }
</style>
</head>
<body>
<div id="info">拖动旋转 · 双指缩放</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 8;

// Procedural moon texture
function makeMoonTexture(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Base grey
  ctx.fillStyle = '#b8b0a8';
  ctx.fillRect(0, 0, size, size);
  
  // Add noise and craters
  const imageData = ctx.getImageData(0, 0, size, size);
  const data = imageData.data;
  
  // Simple noise
  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * 40;
    data[i] += noise;
    data[i+1] += noise;
    data[i+2] += noise;
  }
  ctx.putImageData(imageData, 0, 0);
  
  // Dark maria (seas)
  const maria = [
    [0.3, 0.35, 0.18], [0.55, 0.4, 0.15], [0.4, 0.55, 0.12],
    [0.65, 0.3, 0.1], [0.25, 0.6, 0.08], [0.5, 0.25, 0.13],
    [0.45, 0.5, 0.16], [0.35, 0.45, 0.09],
  ];
  for (const [cx, cy, r] of maria) {
    const grad = ctx.createRadialGradient(cx*size, cy*size, 0, cx*size, cy*size, r*size);
    grad.addColorStop(0, 'rgba(80,75,70,0.6)');
    grad.addColorStop(0.7, 'rgba(90,85,78,0.3)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
  }
  
  // Craters
  for (let i = 0; i < 200; i++) {
    const cx = Math.random() * size;
    const cy = Math.random() * size;
    const r = Math.random() * 15 + 2;
    // Dark ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(60,55,50,${Math.random() * 0.3 + 0.1})`;
    ctx.fill();
    // Bright center
    ctx.beginPath();
    ctx.arc(cx + 1, cy + 1, r * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,195,185,${Math.random() * 0.2 + 0.05})`;
    ctx.fill();
  }
  
  return new THREE.CanvasTexture(canvas);
}

const moonTexture = makeMoonTexture(2048);
const moonGeo = new THREE.SphereGeometry(1, 64, 64);
const moonMat = new THREE.MeshPhongMaterial({
  map: moonTexture,
  shininess: 3,
  specular: new THREE.Color(0x222222),
});
const moon = new THREE.Mesh(moonGeo, moonMat);
scene.add(moon);

// Glow
const glowGeo = new THREE.SphereGeometry(1.08, 64, 64);
const glowMat = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    void main() {
      float intensity = pow(0.6 - dot(vNormal, vec3(0,0,1)), 3.0);
      gl_FragColor = vec4(0.9, 0.92, 1.0, intensity * 0.7);
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true,
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// Lighting — bright enough to see!
const sun = new THREE.DirectionalLight(0xfff5e0, 2.5);
sun.position.set(5, 2, 5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x445566, 1.0));

// Stars
const starsGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(6000);
for (let i = 0; i < 6000; i++) starPos[i] = (Math.random() - 0.5) * 300;
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.7 })));

function animate() {
  requestAnimationFrame(animate);
  moon.rotation.y += 0.0006;
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

setTimeout(() => document.getElementById('info').style.opacity = '0', 3000);
</script>
</body>
</html>
