<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌕</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font: 14px system-ui; text-align: center;
    pointer-events: none; z-index: 10;
  }
</style>
</head>
<body>
<div id="info">拖动旋转 · 双指缩放</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 10;

// Moon
const textureLoader = new THREE.TextureLoader();
const moonTexture = textureLoader.load('https://svs.gsfc.nasa.gov/vis/a000000/a004700/a004720/lroc_color_poles_2048.jpg');
const moonBump = textureLoader.load('https://svs.gsfc.nasa.gov/vis/a000000/a004700/a004720/ldem_3_8bit_2048.jpg');

const moonGeo = new THREE.SphereGeometry(1, 64, 64);
const moonMat = new THREE.MeshStandardMaterial({
  map: moonTexture,
  bumpMap: moonBump,
  bumpScale: 0.04,
  roughness: 1,
  metalness: 0,
});
const moon = new THREE.Mesh(moonGeo, moonMat);
scene.add(moon);

// Glow
const glowGeo = new THREE.SphereGeometry(1.08, 64, 64);
const glowMat = new THREE.ShaderMaterial({
  uniforms: { c: { value: 0.4 }, p: { value: 4.0 } },
  vertexShader: `
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float c;
    uniform float p;
    varying vec3 vNormal;
    void main() {
      float intensity = pow(c - dot(vNormal, vec3(0.0, 0.0, 1.0)), p);
      gl_FragColor = vec4(0.8, 0.85, 1.0, intensity * 0.5);
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true,
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// Light — simulate sunlight
const sun = new THREE.DirectionalLight(0xfff5e0, 2.5);
sun.position.set(5, 2, 5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x222244, 0.3));

// Stars
const starsGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(3000);
for (let i = 0; i < 3000; i++) starPositions[i] = (Math.random() - 0.5) * 200;
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 })));

// Animate
function animate() {
  requestAnimationFrame(animate);
  moon.rotation.y += 0.001;
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Hide info after 3s
setTimeout(() => { document.getElementById('info').style.opacity = '0'; }, 3000);
</script>
</body>
</html>
