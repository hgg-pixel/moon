<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌕</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font: 14px system-ui; text-align: center;
    pointer-events: none; z-index: 10;
    transition: opacity 1s;
  }
</style>
</head>
<body>
<div id="info">拖动旋转 · 双指缩放</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 10;

// Moon texture from solar system scope (reliable CDN, CORS-friendly)
const textureLoader = new THREE.TextureLoader();
const moonTexture = textureLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/planets/moon_1024.jpg');
const moonBump = textureLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/planets/moon_1024.jpg');

const moonGeo = new THREE.SphereGeometry(1, 64, 64);
const moonMat = new THREE.MeshPhongMaterial({
  map: moonTexture,
  bumpMap: moonBump,
  bumpScale: 0.02,
  shininess: 2,
});
const moon = new THREE.Mesh(moonGeo, moonMat);
scene.add(moon);

// Soft glow around moon
const glowGeo = new THREE.SphereGeometry(1.12, 64, 64);
const glowMat = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: `
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    void main() {
      float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
      gl_FragColor = vec4(0.85, 0.88, 1.0, intensity * 0.6);
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true,
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// Lighting
const sun = new THREE.DirectionalLight(0xfff8e7, 3.0);
sun.position.set(5, 3, 5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x334466, 0.8));
// Rim light for drama
const rim = new THREE.DirectionalLight(0x8888cc, 0.5);
rim.position.set(-3, -1, -3);
scene.add(rim);

// Stars
const starsGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPositions[i] = (Math.random() - 0.5) * 300;
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starSizes = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) starSizes[i] = Math.random() * 0.3 + 0.05;
starsGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.15,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.8,
})));

// Animate
function animate() {
  requestAnimationFrame(animate);
  moon.rotation.y += 0.0008;
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

setTimeout(() => {
  const info = document.getElementById('info');
  info.style.opacity = '0';
}, 3000);
</script>
</body>
</html>
