<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌕</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000507; overflow: hidden; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #info {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.45); font: 14px system-ui; text-align: center;
    pointer-events: none; z-index: 10; transition: opacity 1.5s;
  }
  #ar-btn {
    position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 15px; padding: 10px 28px; border-radius: 100px;
    cursor: pointer; backdrop-filter: blur(8px); text-decoration: none; z-index: 10;
  }
</style>
</head>
<body>
<a href="ar.html" id="ar-btn">📱 AR 模式</a>
<div id="info">拖动旋转 · 双指缩放</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.5;
controls.maxDistance = 8;

const loader = new THREE.TextureLoader();
const moonTex  = loader.load('moon_color.jpg');
const moonBump = loader.load('moon_bump.jpg');
moonTex.colorSpace = THREE.SRGBColorSpace;

// Moon — 通透感：低roughness + 强emissive蓝白 + 正面打光
const moonGeo = new THREE.SphereGeometry(1, 64, 64);
const moonMat = new THREE.MeshStandardMaterial({
  map: moonTex,
  bumpMap: moonBump,
  bumpScale: 0.025,
  roughness: 0.55,
  metalness: 0.0,
  emissive: new THREE.Color(0x5a78cc),
  emissiveIntensity: 0.38,
});
const moon = new THREE.Mesh(moonGeo, moonMat);
scene.add(moon);

// 光源从正面打 = full moon，不留黑边
const front = new THREE.DirectionalLight(0xd8e8ff, 4.5);
front.position.set(0, 0, 10);   // 正对镜头
scene.add(front);

// 补一圈柔光，让月球表面更均匀
scene.add(new THREE.AmbientLight(0x8899cc, 2.8));

// 顶部蓝白轮廓光
const top = new THREE.DirectionalLight(0xaabbff, 1.2);
top.position.set(0, 5, 2);
scene.add(top);

// 内发光：一个PointLight放在球心
const inner = new THREE.PointLight(0x99bbff, 1.5, 3);
inner.position.set(0, 0, 0);
scene.add(inner);

// Halo 三层
function halo(radius, c, p, color, alpha) {
  const mat = new THREE.ShaderMaterial({
    uniforms: { c:{value:c}, p:{value:p}, col:{value:color}, a:{value:alpha} },
    vertexShader: `varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1); }`,
    fragmentShader: `uniform float c,p,a; uniform vec3 col; varying vec3 vN; void main(){ float i=pow(c-dot(vN,vec3(0,0,1)),p); gl_FragColor=vec4(col,i*a); }`,
    side: THREE.BackSide, blending: THREE.AdditiveBlending,
    transparent: true, depthWrite: false,
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(radius,64,64), mat));
}
halo(1.06, 0.50, 3.0, new THREE.Color(0.95,0.97,1.00), 0.65); // 白色紧贴
halo(1.22, 0.58, 4.0, new THREE.Color(0.50,0.65,1.00), 0.40); // 蓝色中圈
halo(1.60, 0.63, 5.5, new THREE.Color(0.30,0.25,0.75), 0.20); // 紫色外晕

// Stars
function stars(n, size, op) {
  const geo = new THREE.BufferGeometry();
  const p = new Float32Array(n*3);
  for(let i=0;i<n*3;i++) p[i]=(Math.random()-.5)*300;
  geo.setAttribute('position', new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color:0xffffff,size,transparent:true,opacity:op})));
}
stars(2000, 0.18, 0.8);
stars(600,  0.32, 0.5);

function animate(){
  requestAnimationFrame(animate);
  moon.rotation.y += 0.0007;
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
setTimeout(()=>document.getElementById('info').style.opacity='0', 4000);
</script>
</body>
</html>
