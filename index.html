<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌕</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #info {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font: 14px system-ui; text-align: center;
    pointer-events: none; z-index: 10; transition: opacity 1.5s;
  }
  #ar-btn {
    position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
    color: #fff; font-size: 15px; padding: 10px 28px; border-radius: 100px;
    cursor: pointer; backdrop-filter: blur(8px); text-decoration: none;
    z-index: 10;
  }
</style>
</head>
<body>
<a href="ar.html" id="ar-btn">📱 AR 模式</a>
<div id="info">拖动旋转 · 双指缩放</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 8;

const loader = new THREE.TextureLoader();
const moonTex  = loader.load('moon_color.jpg');
const moonBump = loader.load('moon_bump.jpg');

// Moon surface — slightly cool-tinted for dreaminess
moonTex.colorSpace = THREE.SRGBColorSpace;
const moonGeo = new THREE.SphereGeometry(1, 64, 64);
const moonMat = new THREE.MeshStandardMaterial({
  map: moonTex,
  bumpMap: moonBump,
  bumpScale: 0.04,
  roughness: 0.88,
  metalness: 0.0,
  emissive: new THREE.Color(0x2a3a5a),   // blue inner glow
  emissiveIntensity: 0.18,
});
const moon = new THREE.Mesh(moonGeo, moonMat);
scene.add(moon);

// Layer 1: tight inner halo — warm white
addHalo(1.05, 0.55, 3.5, new THREE.Color(0.95, 0.96, 1.00), 0.50);
// Layer 2: mid halo — cool blue
addHalo(1.18, 0.60, 4.0, new THREE.Color(0.55, 0.70, 1.00), 0.30);
// Layer 3: wide outer halo — deep purple
addHalo(1.45, 0.65, 5.0, new THREE.Color(0.40, 0.30, 0.80), 0.15);

function addHalo(radius, c, p, color, alpha) {
  const geo = new THREE.SphereGeometry(radius, 64, 64);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      c: { value: c }, p: { value: p },
      glowColor: { value: color }, alpha: { value: alpha },
    },
    vertexShader: `
      varying vec3 vNormal;
      void main(){
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `
      uniform float c, p, alpha;
      uniform vec3 glowColor;
      varying vec3 vNormal;
      void main(){
        float i = pow(c - dot(vNormal, vec3(0,0,1)), p);
        gl_FragColor = vec4(glowColor, i * alpha);
      }`,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
  });
  scene.add(new THREE.Mesh(geo, mat));
}

// Lighting — bright key + generous fill so dark side stays visible
const sun = new THREE.DirectionalLight(0xfff0d0, 3.8);
sun.position.set(4, 2, 5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6677aa, 2.2));   // strong blue-grey fill
const rim = new THREE.DirectionalLight(0x8899dd, 0.8);
rim.position.set(-4, -1, -4);
scene.add(rim);

// Stars — two sizes for depth
function addStars(count, size, opacity) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count*3; i++) pos[i] = (Math.random()-0.5)*300;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size, transparent: true, opacity,
  })));
}
addStars(2000, 0.18, 0.8);
addStars(800,  0.35, 0.5);

function animate() {
  requestAnimationFrame(animate);
  moon.rotation.y += 0.0007;
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(() => document.getElementById('info').style.opacity='0', 4000);
</script>
</body>
</html>
