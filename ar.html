<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌕 AR月亮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: system-ui, sans-serif; color: #fff; }
  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000;
    z-index: 100;
  }
  #overlay h1 { font-size: 64px; margin-bottom: 16px; }
  #overlay p { color: #aaa; font-size: 15px; margin-bottom: 32px; text-align: center; max-width: 280px; }
  #start-ar {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 16px; padding: 14px 36px;
    border-radius: 100px; cursor: pointer;
    backdrop-filter: blur(10px);
    transition: background 0.2s;
  }
  #start-ar:hover { background: rgba(255,255,255,0.25); }
  #no-ar { color: #f66; font-size: 14px; margin-top: 16px; display: none; }
  #hint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-size: 14px; text-align: center;
    pointer-events: none; z-index: 10;
    transition: opacity 1s;
  }
  #reticle-hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.8); font-size: 13px; text-align: center;
    pointer-events: none; z-index: 10; display: none;
  }
  canvas { display: block; }
  #back {
    position: fixed; top: 20px; left: 20px; z-index: 200;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 8px 16px; border-radius: 20px;
    text-decoration: none; font-size: 14px; display: none;
  }
</style>
</head>
<body>
<div id="overlay">
  <h1>🌕</h1>
  <p>将月亮放置在你的现实世界中</p>
  <button id="start-ar">进入 AR</button>
  <div id="no-ar">你的设备不支持 WebXR AR</div>
</div>
<div id="hint">移动手机扫描平面，点击放置月亮</div>
<div id="reticle-hint">正在扫描平面…</div>
<a href="/" id="back">← 返回</a>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// Procedural moon texture (same as main page)
function makeMoonTexture(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#b8b0a8';
  ctx.fillRect(0, 0, size, size);
  const imageData = ctx.getImageData(0, 0, size, size);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * 40;
    data[i] += noise; data[i+1] += noise; data[i+2] += noise;
  }
  ctx.putImageData(imageData, 0, 0);
  const maria = [
    [0.3,0.35,0.18],[0.55,0.4,0.15],[0.4,0.55,0.12],
    [0.65,0.3,0.1],[0.25,0.6,0.08],[0.5,0.25,0.13],
  ];
  for (const [cx,cy,r] of maria) {
    const grad = ctx.createRadialGradient(cx*size,cy*size,0,cx*size,cy*size,r*size);
    grad.addColorStop(0,'rgba(80,75,70,0.6)');
    grad.addColorStop(0.7,'rgba(90,85,78,0.3)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,size,size);
  }
  for (let i = 0; i < 150; i++) {
    const cx = Math.random()*size, cy = Math.random()*size, r = Math.random()*12+2;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(60,55,50,${Math.random()*0.3+0.1})`; ctx.fill();
    ctx.beginPath(); ctx.arc(cx+1,cy+1,r*0.6,0,Math.PI*2);
    ctx.fillStyle = `rgba(200,195,185,${Math.random()*0.2+0.05})`; ctx.fill();
  }
  return new THREE.CanvasTexture(canvas);
}

// Scene
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// Moon mesh (radius 0.15m = 15cm in AR, nice tabletop size)
const moonTex = makeMoonTexture(1024);
const moonGeo = new THREE.SphereGeometry(0.12, 48, 48);
const moonMat = new THREE.MeshPhongMaterial({ map: moonTex, shininess: 3 });
const moon = new THREE.Mesh(moonGeo, moonMat);
moon.visible = false;
scene.add(moon);

// Glow
const glowGeo = new THREE.SphereGeometry(0.135, 48, 48);
const glowMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec3 vNormal; void main(){vNormal=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1);}`,
  fragmentShader: `varying vec3 vNormal; void main(){float i=pow(0.6-dot(vNormal,vec3(0,0,1)),3.);gl_FragColor=vec4(0.9,0.92,1.,i*0.6);}`,
  side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.visible = false;
scene.add(glow);

// Lighting
scene.add(new THREE.DirectionalLight(0xfff5e0, 2.0).position.set(5,5,5) && new THREE.DirectionalLight(0xfff5e0, 2.0));
const sun = new THREE.DirectionalLight(0xfff5e0, 2.0);
sun.position.set(5,5,5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x445566, 1.2));

// Reticle (placement guide)
const reticleGeo = new THREE.RingGeometry(0.06, 0.08, 32).rotateX(-Math.PI/2);
const reticleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
const reticle = new THREE.Mesh(reticleGeo, reticleMat);
reticle.matrixAutoUpdate = false;
reticle.visible = false;
scene.add(reticle);

// Hit test
let hitTestSource = null;
let hitTestSourceRequested = false;
let moonPlaced = false;

const startBtn = document.getElementById('start-ar');
const overlay = document.getElementById('overlay');
const hint = document.getElementById('hint');
const reticleHint = document.getElementById('reticle-hint');
const backBtn = document.getElementById('back');

// Check WebXR support
if (!navigator.xr) {
  startBtn.style.display = 'none';
  document.getElementById('no-ar').style.display = 'block';
} else {
  navigator.xr.isSessionSupported('immersive-ar').then(supported => {
    if (!supported) {
      startBtn.style.display = 'none';
      document.getElementById('no-ar').style.display = 'block';
    }
  });
}

startBtn.addEventListener('click', async () => {
  const session = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: document.body }
  });
  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(session);
  overlay.style.display = 'none';
  hint.style.display = 'block';
  reticleHint.style.display = 'block';
  backBtn.style.display = 'block';
  renderer.setAnimationLoop(render);
});

// Tap to place
window.addEventListener('click', () => {
  if (reticle.visible && !moonPlaced) {
    moon.position.setFromMatrixPosition(reticle.matrix);
    glow.position.setFromMatrixPosition(reticle.matrix);
    moon.visible = true;
    glow.visible = true;
    reticle.visible = false;
    moonPlaced = true;
    hint.textContent = '拖动旋转月亮 · 捏合缩放';
    reticleHint.style.display = 'none';
    setTimeout(() => hint.style.opacity = '0', 4000);
  }
});

function render(timestamp, frame) {
  if (frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();
    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then(viewerSpace => {
        session.requestHitTestSource({ space: viewerSpace }).then(source => {
          hitTestSource = source;
        });
      });
      session.addEventListener('end', () => {
        hitTestSourceRequested = false;
        hitTestSource = null;
        moonPlaced = false;
      });
      hitTestSourceRequested = true;
    }
    if (hitTestSource && !moonPlaced) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        reticle.visible = true;
        reticle.matrix.fromArray(hit.getPose(refSpace).transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
    if (moon.visible) moon.rotation.y += 0.005;
  }
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
