<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌕 AR月亮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; touch-action: none; }
  #cam { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  canvas { position: fixed; inset: 0; z-index: 1; }
  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: #000; z-index: 100;
  }
  #overlay h1 { font-size: 64px; margin-bottom: 16px; }
  #overlay p { color: #aaa; font-size: 15px; margin-bottom: 32px; text-align: center; max-width: 280px; line-height: 1.6; }
  #start-ar {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 16px; padding: 14px 36px; border-radius: 100px;
    cursor: pointer; backdrop-filter: blur(10px); transition: background 0.2s;
  }
  #start-ar:hover { background: rgba(255,255,255,0.25); }
  #hint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.8); font-size: 14px; text-align: center;
    pointer-events: none; z-index: 10; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    transition: opacity 1.5s;
  }
  #back {
    position: fixed; top: 20px; left: 20px; z-index: 200;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 8px 16px; border-radius: 20px;
    text-decoration: none; font-size: 14px; display: none;
  }
  #err { color: #f66; font-size: 14px; margin-top: 16px; display: none; text-align: center; max-width: 280px; }
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="overlay">
  <h1>🌕</h1>
  <p>用摄像头看到月亮<br>移动手机寻找它</p>
  <button id="start-ar">进入 AR</button>
  <div id="err"></div>
</div>
<div id="hint" style="display:none;">移动手机寻找月亮 🌕</div>
<a href="/" id="back">← 返回</a>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const cam = document.getElementById('cam');
const overlay = document.getElementById('overlay');
const hint = document.getElementById('hint');
const backBtn = document.getElementById('back');
const startBtn = document.getElementById('start-ar');
const errDiv = document.getElementById('err');

// === Procedural moon texture ===
function makeMoonTexture(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#b8b0a8';
  ctx.fillRect(0, 0, size, size);
  const img = ctx.getImageData(0, 0, size, size);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 40;
    img.data[i] += n; img.data[i+1] += n; img.data[i+2] += n;
  }
  ctx.putImageData(img, 0, 0);
  for (const [cx,cy,r] of [[.3,.35,.18],[.55,.4,.15],[.4,.55,.12],[.65,.3,.1],[.25,.6,.08],[.5,.25,.13]]) {
    const g = ctx.createRadialGradient(cx*size,cy*size,0,cx*size,cy*size,r*size);
    g.addColorStop(0,'rgba(80,75,70,0.6)');
    g.addColorStop(0.7,'rgba(90,85,78,0.3)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,size,size);
  }
  for (let i = 0; i < 150; i++) {
    const cx = Math.random()*size, cy = Math.random()*size, r = Math.random()*12+2;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(60,55,50,${Math.random()*0.3+0.1})`; ctx.fill();
    ctx.beginPath(); ctx.arc(cx+1,cy+1,r*.6,0,Math.PI*2);
    ctx.fillStyle = `rgba(200,195,185,${Math.random()*0.2+0.05})`; ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

// === Try load 8K texture, fallback to procedural ===
function loadMoonTexture() {
  return new Promise(resolve => {
    const loader = new THREE.TextureLoader();
    loader.load('moon_8k.jpg',
      tex => { tex.colorSpace = THREE.SRGBColorSpace; resolve(tex); },
      undefined,
      () => { resolve(makeMoonTexture(1024)); }
    );
  });
}

// === Three.js scene ===
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// Moon placed "in the sky" — fixed world position
// We'll put the moon at a direction, and use gyroscope to rotate camera
const MOON_DISTANCE = 30;

const moonTex = await loadMoonTexture();
const moonGeo = new THREE.SphereGeometry(3, 64, 64);
const moonMat = new THREE.MeshPhysicalMaterial({
  map: moonTex, roughness: 0.95, metalness: 0,
  clearcoat: 0.05, transmission: 0.08,
});
const moon = new THREE.Mesh(moonGeo, moonMat);

// Glow sprite
const glowGeo = new THREE.SphereGeometry(3.4, 48, 48);
const glowMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec3 vNormal; void main(){vNormal=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader: `varying vec3 vNormal; void main(){float i=pow(0.65-dot(vNormal,vec3(0,0,1)),3.);gl_FragColor=vec4(0.9,0.92,1.,i*0.5);}`,
  side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false,
});
const glow = new THREE.Mesh(glowGeo, glowMat);

// Group for moon + glow
const moonGroup = new THREE.Group();
moonGroup.add(moon);
moonGroup.add(glow);
scene.add(moonGroup);

// Light
const sunLight = new THREE.DirectionalLight(0xfff5e0, 2.5);
sunLight.position.set(10, 8, 5);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x334455, 0.8));

// === Gyroscope state ===
let alpha = 0, beta = 0, gamma = 0;
let hasGyro = false;
let initialAlpha = null;

// Moon's fixed "sky" position — slightly up and to the right from initial facing
// We'll anchor it relative to where the user first pointed
let moonAnchorAlpha = 30;  // degrees offset from initial facing (right)
let moonAnchorBeta = -20;   // degrees offset (up)

// Touch drag to reposition moon
let touchStartX = 0, touchStartY = 0;
let moonOffsetX = 0, moonOffsetY = 0;
let dragging = false;

// Pinch to scale
let lastPinchDist = 0;
let moonScale = 1;

function updateMoonPosition() {
  // Convert gyro to camera rotation
  const a = THREE.MathUtils.degToRad(alpha);
  const b = THREE.MathUtils.degToRad(beta);
  const g = THREE.MathUtils.degToRad(gamma);

  // Use device orientation to set camera quaternion
  // Standard approach: ZXY Euler from device orientation
  const euler = new THREE.Euler(b, a, -g, 'YXZ');
  camera.quaternion.setFromEuler(euler);

  // Place moon at fixed world position
  const anchorA = THREE.MathUtils.degToRad(moonAnchorAlpha + moonOffsetX);
  const anchorB = THREE.MathUtils.degToRad(moonAnchorBeta + moonOffsetY);
  moonGroup.position.set(
    MOON_DISTANCE * Math.sin(anchorA) * Math.cos(anchorB),
    MOON_DISTANCE * Math.sin(anchorB),
    -MOON_DISTANCE * Math.cos(anchorA) * Math.cos(anchorB)
  );
}

function onOrientation(e) {
  if (e.alpha === null) return;
  hasGyro = true;
  if (initialAlpha === null) {
    initialAlpha = e.alpha;
    // Anchor moon relative to initial facing direction
    moonAnchorAlpha = initialAlpha + 25;
  }
  alpha = e.alpha;
  beta = e.beta != null ? (e.beta - 90) : 0; // phone upright = looking forward
  gamma = e.gamma || 0;
}

// === Touch controls ===
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx + dy*dy);
  }
});

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (dragging && e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    moonOffsetX += dx * 0.15;
    moonOffsetY -= dy * 0.15;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastPinchDist > 0) {
      moonScale *= dist / lastPinchDist;
      moonScale = Math.max(0.3, Math.min(3, moonScale));
      moonGroup.scale.setScalar(moonScale);
    }
    lastPinchDist = dist;
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', () => { dragging = false; lastPinchDist = 0; });

// === Animation ===
function animate() {
  requestAnimationFrame(animate);
  updateMoonPosition();
  moon.rotation.y += 0.002;
  renderer.render(scene, camera);
}

// === Start ===
startBtn.addEventListener('click', async () => {
  // 1. Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    cam.srcObject = stream;
  } catch (e) {
    errDiv.style.display = 'block';
    errDiv.textContent = '无法访问摄像头: ' + e.message;
    return;
  }

  // 2. Gyroscope — request permission on iOS 13+
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') {
        errDiv.style.display = 'block';
        errDiv.textContent = '需要陀螺仪权限才能使用 AR';
        return;
      }
    } catch (e) {
      errDiv.style.display = 'block';
      errDiv.textContent = '陀螺仪权限请求失败';
      return;
    }
  }

  window.addEventListener('deviceorientation', onOrientation, true);

  // Wait a beat for first gyro reading
  await new Promise(r => setTimeout(r, 500));

  if (!hasGyro) {
    // Fallback: use touch-only mode (desktop or no gyro)
    // Let user drag to look around
    let isDragging = false, lastX = 0, lastY = 0;
    let lookX = 0, lookY = 0;
    renderer.domElement.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    renderer.domElement.addEventListener('mousemove', e => {
      if (!isDragging) return;
      lookX += (e.clientX - lastX) * 0.3;
      lookY += (e.clientY - lastY) * 0.3;
      lookY = Math.max(-80, Math.min(80, lookY));
      alpha = lookX; beta = -lookY;
      lastX = e.clientX; lastY = e.clientY;
    });
    renderer.domElement.addEventListener('mouseup', () => isDragging = false);
    hint.textContent = '拖动屏幕寻找月亮 🌕';
    initialAlpha = 0;
    moonAnchorAlpha = 25;
  }

  overlay.style.display = 'none';
  hint.style.display = 'block';
  backBtn.style.display = 'block';
  setTimeout(() => { hint.style.opacity = '0'; }, 5000);
  animate();
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
