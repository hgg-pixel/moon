<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌕 AR月亮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; touch-action: none; }
  #cam { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  canvas { position: fixed; inset: 0; z-index: 1; }
  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: #000; z-index: 100;
  }
  #overlay h1 { font-size: 64px; margin-bottom: 16px; }
  #overlay p { color: #aaa; font-size: 15px; margin-bottom: 32px; text-align: center; max-width: 280px; line-height: 1.6; }
  #start-ar {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 16px; padding: 14px 36px; border-radius: 100px;
    cursor: pointer; backdrop-filter: blur(10px); transition: background 0.2s;
  }
  #start-ar:active { background: rgba(255,255,255,0.3); }
  #hint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.8); font-size: 14px; text-align: center;
    pointer-events: none; z-index: 10; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    transition: opacity 1.5s;
  }
  #back {
    position: fixed; top: 20px; left: 20px; z-index: 200;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 8px 16px; border-radius: 20px;
    text-decoration: none; font-size: 14px; display: none;
  }
  #err { color: #f66; font-size: 14px; margin-top: 16px; display: none; text-align: center; max-width: 280px; }
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="overlay">
  <h1>🌕</h1>
  <p>用摄像头看到月亮<br>移动手机寻找它</p>
  <button id="start-ar">进入 AR</button>
  <div id="err"></div>
</div>
<div id="hint" style="display:none;">移动手机寻找月亮 🌕</div>
<a href="/" id="back">← 返回</a>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const $ = id => document.getElementById(id);
const cam = $('cam'), overlay = $('overlay'), hint = $('hint');
const backBtn = $('back'), startBtn = $('start-ar'), errDiv = $('err');

/* ── Procedural moon texture ── */
function makeMoonTexture(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#b8b0a8';
  ctx.fillRect(0, 0, size, size);
  const img = ctx.getImageData(0, 0, size, size);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 40;
    img.data[i] += n; img.data[i+1] += n; img.data[i+2] += n;
  }
  ctx.putImageData(img, 0, 0);
  for (const [cx,cy,r] of [[.3,.35,.18],[.55,.4,.15],[.4,.55,.12],[.65,.3,.1],[.25,.6,.08],[.5,.25,.13]]) {
    const g = ctx.createRadialGradient(cx*size,cy*size,0,cx*size,cy*size,r*size);
    g.addColorStop(0,'rgba(80,75,70,0.6)');
    g.addColorStop(0.7,'rgba(90,85,78,0.3)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,size,size);
  }
  for (let i = 0; i < 150; i++) {
    const cx = Math.random()*size, cy = Math.random()*size, r = Math.random()*12+2;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(60,55,50,${Math.random()*0.3+0.1})`; ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

/* ── Scene setup (no await — instant) ── */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

const MOON_DISTANCE = 30;

// Moon: self-illuminating via emissive — no harsh external light
const procTex = makeMoonTexture(1024);
const moonMat = new THREE.MeshStandardMaterial({
  map: procTex, emissiveMap: procTex,
  emissive: new THREE.Color(0xeee8dd), emissiveIntensity: 1.2,
  roughness: 1, metalness: 0,
});
const moon = new THREE.Mesh(new THREE.SphereGeometry(3, 64, 64), moonMat);

// Async 8K upgrade
new THREE.TextureLoader().load('moon_8k.jpg', tex => {
  tex.colorSpace = THREE.SRGBColorSpace;
  moonMat.map = tex; moonMat.emissiveMap = tex; moonMat.needsUpdate = true;
});

// Soft volumetric glow — 3 graduated layers
const moonGroup = new THREE.Group();
moonGroup.add(moon);
for (const [s, o, c] of [[1.08,.18,[.95,.93,.85]], [1.18,.10,[.9,.9,.95]], [1.35,.045,[.85,.88,1.]]]) {
  const m = new THREE.ShaderMaterial({
    vertexShader: `varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader: `varying vec3 vN;uniform vec3 c;uniform float o;void main(){float i=pow(0.7-dot(vN,vec3(0,0,1)),2.5);gl_FragColor=vec4(c,i*o);}`,
    uniforms: { c: { value: new THREE.Vector3(...c) }, o: { value: o } },
    side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false,
  });
  moonGroup.add(new THREE.Mesh(new THREE.SphereGeometry(3*s, 48, 48), m));
}
scene.add(moonGroup);

// Dim fill only — moon self-lights
scene.add(new THREE.DirectionalLight(0xfff5e0, 0.6).translateX(5).translateY(5).translateZ(3));
scene.add(new THREE.AmbientLight(0x222233, 0.3));

/* ── Gyro state ── */
let alpha = 0, beta = 0, gamma = 0;
let hasGyro = false, initialAlpha = null;
let moonAnchorAlpha = 30, moonAnchorBeta = -20;
let moonOffsetX = 0, moonOffsetY = 0, moonScale = 1;
let dragging = false, touchStartX = 0, touchStartY = 0, lastPinchDist = 0;

function updateMoonPosition() {
  const euler = new THREE.Euler(
    THREE.MathUtils.degToRad(beta),
    THREE.MathUtils.degToRad(alpha),
    THREE.MathUtils.degToRad(-gamma),
    'YXZ'
  );
  camera.quaternion.setFromEuler(euler);

  const a = THREE.MathUtils.degToRad(moonAnchorAlpha + moonOffsetX);
  const b = THREE.MathUtils.degToRad(moonAnchorBeta + moonOffsetY);
  moonGroup.position.set(
    MOON_DISTANCE * Math.sin(a) * Math.cos(b),
    MOON_DISTANCE * Math.sin(b),
    -MOON_DISTANCE * Math.cos(a) * Math.cos(b)
  );
}

function onOrientation(e) {
  if (e.alpha == null) return;
  hasGyro = true;
  if (initialAlpha === null) {
    initialAlpha = e.alpha;
    moonAnchorAlpha = e.alpha + 25;
  }
  alpha = e.alpha;
  beta = (e.beta ?? 0) - 90;
  gamma = e.gamma ?? 0;
}

/* ── Touch ── */
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.hypot(dx, dy);
  }
});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (dragging && e.touches.length === 1) {
    moonOffsetX += (e.touches[0].clientX - touchStartX) * 0.15;
    moonOffsetY -= (e.touches[0].clientY - touchStartY) * 0.15;
    touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastPinchDist > 0) { moonScale = Math.max(0.3, Math.min(3, moonScale * d / lastPinchDist)); moonGroup.scale.setScalar(moonScale); }
    lastPinchDist = d;
  }
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => { dragging = false; lastPinchDist = 0; });

/* ── Animate ── */
function animate() {
  requestAnimationFrame(animate);
  updateMoonPosition();
  moon.rotation.y += 0.002;
  renderer.render(scene, camera);
}

/* ── START BUTTON ── */
startBtn.addEventListener('click', async () => {
  startBtn.textContent = '启动中…';
  startBtn.disabled = true;

  // Camera
  try {
    cam.srcObject = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
  } catch (e) {
    errDiv.style.display = 'block';
    errDiv.textContent = '无法访问摄像头: ' + e.message;
    startBtn.textContent = '进入 AR'; startBtn.disabled = false;
    return;
  }

  // iOS gyro permission
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      if ((await DeviceOrientationEvent.requestPermission()) !== 'granted') {
        errDiv.style.display = 'block'; errDiv.textContent = '需要陀螺仪权限';
        startBtn.textContent = '进入 AR'; startBtn.disabled = false;
        return;
      }
    } catch { /* ignore, will try without */ }
  }
  window.addEventListener('deviceorientation', onOrientation, true);

  // Wait briefly for gyro
  await new Promise(r => setTimeout(r, 600));

  // Desktop/no-gyro fallback
  if (!hasGyro) {
    let drag = false, lx = 0, ly = 0, lookX = 0, lookY = 0;
    const el = renderer.domElement;
    el.addEventListener('mousedown', e => { drag = true; lx = e.clientX; ly = e.clientY; });
    el.addEventListener('mousemove', e => {
      if (!drag) return;
      lookX += (e.clientX - lx) * 0.3; lookY += (e.clientY - ly) * 0.3;
      lookY = Math.max(-80, Math.min(80, lookY));
      alpha = lookX; beta = -lookY;
      lx = e.clientX; ly = e.clientY;
    });
    el.addEventListener('mouseup', () => drag = false);
    hint.textContent = '拖动屏幕寻找月亮 🌕';
    initialAlpha = 0; moonAnchorAlpha = 25;
  }

  overlay.style.display = 'none';
  hint.style.display = 'block';
  backBtn.style.display = 'block';
  setTimeout(() => hint.style.opacity = '0', 5000);
  animate();
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
